root = "."
tmp_dir = "tmp"

[build]
pre_cmd = ["templ generate"]
cmd = "go build -o ./tmp/server ./cmd/server"
bin = "tmp/server"
poll = true
poll_interval = 500
include_ext = ["go", "templ"]
exclude_file = ["web/templates/*_templ.go"]
exclude_dir = ["tmp", ".git", ".github", ".claude", "deploy"]
exclude_regex = ["_test\\.go", "_templ\\.go$"]
delay = 200
stop_on_error = true

[log]
time = true
