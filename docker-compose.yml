services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: recipe
      POSTGRES_PASSWORD: recipe
      POSTGRES_DB: recipe_platform
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe -d recipe_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://recipe:recipe@postgres:5432/recipe_platform?sslmode=disable
      PORT: "8080"
      HOT_RELOAD: "1"
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  go-mod-cache:
  go-build-cache:
